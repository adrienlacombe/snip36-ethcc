<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <linearGradient id="onchain-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="offchain-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="700">SNIP-36 CoinFlip — Complete Flow Diagram</text>

  <!-- Legend -->
  <rect x="30" y="60" width="16" height="16" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="52" y="73" fill="#34d399" font-size="12" font-weight="600">On-chain (Starknet Sepolia)</text>
  <rect x="250" y="60" width="16" height="16" rx="3" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="272" y="73" fill="#a78bfa" font-size="12" font-weight="600">Off-chain (Server / Browser)</text>
  <rect x="500" y="60" width="16" height="16" rx="3" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1"/>
  <text x="522" y="73" fill="#fbbf24" font-size="12" font-weight="600">Player wallet action</text>
  <rect x="730" y="60" width="16" height="16" rx="3" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="752" y="73" fill="#94a3b8" font-size="12">State update</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ZONE: Off-chain (left side) -->
  <rect x="20" y="95" width="520" height="810" rx="10" fill="url(#offchain-bg)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="280" y="118" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" opacity="0.7">OFF-CHAIN</text>

  <!-- ZONE: On-chain (right side) -->
  <rect x="560" y="95" width="520" height="810" rx="10" fill="url(#onchain-bg)" stroke="#34d399" stroke-width="1" stroke-opacity="0.3"/>
  <text x="820" y="118" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600" opacity="0.7">ON-CHAIN (Starknet Sepolia)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 1: Commit -->
  <rect x="40" y="140" width="240" height="60" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="60" y="163" fill="#fbbf24" font-size="13" font-weight="700">1. Commit</text>
  <text x="60" y="183" fill="#d1d5db" font-size="11">Browser: pedersen(bet, nonce)</text>

  <rect x="300" y="140" width="220" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="163" fill="#94a3b8" font-size="13" font-weight="600">Server stores</text>
  <text x="320" y="183" fill="#64748b" font-size="11">commitment hash (bet hidden)</text>

  <!-- Arrow 1→server -->
  <line x1="280" y1="170" x2="298" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 2: Deposit -->
  <rect x="40" y="225" width="240" height="60" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="60" y="248" fill="#fbbf24" font-size="13" font-weight="700">2. Deposit STRK</text>
  <text x="60" y="268" fill="#d1d5db" font-size="11">Wallet signs: approve + deposit</text>

  <!-- On-chain: STRK transfer -->
  <rect x="580" y="225" width="240" height="60" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="248" fill="#34d399" font-size="13" font-weight="700">STRK.transferFrom()</text>
  <text x="600" y="268" fill="#a7f3d0" font-size="11">Player → CoinFlipBank contract</text>

  <!-- On-chain: state update -->
  <rect x="840" y="225" width="220" height="60" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="860" y="248" fill="#94a3b8" font-size="12" font-weight="600">CoinFlipBank state:</text>
  <text x="860" y="268" fill="#64748b" font-size="11">game[session] = DEPOSITED</text>

  <!-- Arrow deposit → on-chain -->
  <line x1="280" y1="255" x2="578" y2="255" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="820" y1="255" x2="838" y2="255" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 3: Bank Match -->
  <rect x="300" y="310" width="220" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="333" fill="#94a3b8" font-size="13" font-weight="600">3. Bank Match</text>
  <text x="320" y="353" fill="#64748b" font-size="11">Server calls match_deposit()</text>

  <rect x="580" y="310" width="240" height="60" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="333" fill="#34d399" font-size="13" font-weight="700">STRK.transferFrom()</text>
  <text x="600" y="353" fill="#a7f3d0" font-size="11">Bank → CoinFlipBank contract</text>

  <rect x="840" y="310" width="220" height="60" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="860" y="333" fill="#94a3b8" font-size="12" font-weight="600">CoinFlipBank state:</text>
  <text x="860" y="353" fill="#64748b" font-size="11">game[session] = MATCHED</text>

  <line x1="520" y1="340" x2="578" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="340" x2="838" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 4: Seed Lock -->
  <rect x="300" y="395" width="220" height="60" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="320" y="418" fill="#60a5fa" font-size="13" font-weight="700">4. Lock Seed</text>
  <text x="320" y="438" fill="#94a3b8" font-size="11">seed = current_block - 1</text>

  <text x="410" y="470" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">After match_deposit confirmed</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 5: Virtual OS Execution -->
  <rect x="40" y="490" width="480" height="75" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="515" fill="#a78bfa" font-size="13" font-weight="700">5. Virtual OS Execution (off-chain)</text>
  <text x="60" y="535" fill="#c4b5fd" font-size="11">Execute play(seed, player, bet) against reference block state</text>
  <text x="60" y="550" fill="#8b5cf6" font-size="10">Output: Cairo PIE + L2→L1 message [player, seed, bet, outcome, won]</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 6: stwo Prover -->
  <rect x="40" y="585" width="480" height="60" rx="8" fill="#1e1b4b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="60" y="608" fill="#f472b6" font-size="13" font-weight="700">6. stwo STARK Prover (off-chain)</text>
  <text x="60" y="628" fill="#f9a8d4" font-size="11">Generates Circle STARK proof (~200-400 KB) proving honest execution</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 7: Submit proof -->
  <rect x="300" y="670" width="220" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="693" fill="#94a3b8" font-size="13" font-weight="600">7. Submit Proof</text>
  <text x="320" y="713" fill="#64748b" font-size="11">Server → Gateway</text>

  <rect x="580" y="670" width="240" height="60" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="693" fill="#34d399" font-size="13" font-weight="700">Protocol Verification</text>
  <text x="600" y="713" fill="#a7f3d0" font-size="11">stwo proof verified in-protocol</text>

  <line x1="520" y1="700" x2="578" y2="700" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 8: Settlement -->
  <rect x="300" y="755" width="220" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="778" fill="#94a3b8" font-size="13" font-weight="600">8. Settle</text>
  <text x="320" y="798" fill="#64748b" font-size="11">Server calls settle(session)</text>

  <rect x="580" y="755" width="240" height="75" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="778" fill="#34d399" font-size="13" font-weight="700">CoinFlipBank.settle()</text>
  <text x="600" y="798" fill="#a7f3d0" font-size="11">Recompute: pedersen(seed, player) % 2</text>
  <text x="600" y="816" fill="#a7f3d0" font-size="11">Credit winner's balance with 2x bet</text>

  <rect x="840" y="755" width="220" height="60" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="860" y="778" fill="#94a3b8" font-size="12" font-weight="600">CoinFlipBank state:</text>
  <text x="860" y="798" fill="#64748b" font-size="11">player_balance[winner] += 2x</text>

  <line x1="520" y1="785" x2="578" y2="785" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="785" x2="838" y2="785" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 9: Withdraw -->
  <rect x="40" y="845" width="240" height="50" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="60" y="868" fill="#fbbf24" font-size="13" font-weight="700">9. Withdraw (optional)</text>
  <text x="60" y="883" fill="#d1d5db" font-size="11">Player signs withdraw() tx</text>

  <rect x="580" y="845" width="240" height="50" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="868" fill="#34d399" font-size="13" font-weight="700">STRK.transfer()</text>
  <text x="600" y="883" fill="#a7f3d0" font-size="11">CoinFlipBank → Player wallet</text>

  <line x1="280" y1="870" x2="578" y2="870" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Vertical flow arrows (left side) -->
  <line x1="160" y1="200" x2="160" y2="223" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="200" x2="410" y2="308" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="370" x2="410" y2="393" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="455" x2="280" y2="488" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="280" y1="565" x2="280" y2="583" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="280" y1="645" x2="410" y2="668" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="730" x2="410" y2="753" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="160" y1="285" x2="160" y2="843" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Key insight callout -->
  <rect x="40" y="395" width="240" height="60" rx="8" fill="#fbbf2410" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="60" y="418" fill="#fbbf24" font-size="11" font-weight="600">KEY: Nonce at seed_block</text>
  <text x="60" y="433" fill="#fbbf24" font-size="10">includes match_deposit tx,</text>
  <text x="60" y="446" fill="#fbbf24" font-size="10">so proof + gateway agree</text>
</svg>
