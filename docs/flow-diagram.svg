<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c084fc"/>
    </marker>
    <linearGradient id="onchain-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="server-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="vblock-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b0764" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="950" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="700">SNIP-36 CoinFlip Demo — Flow Diagram</text>

  <!-- Legend -->
  <rect x="200" y="58" width="14" height="14" rx="3" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="220" y="70" fill="#fbbf24" font-size="11" font-weight="600">Player (browser/wallet)</text>

  <rect x="400" y="58" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="420" y="70" fill="#60a5fa" font-size="11" font-weight="600">Server (backend)</text>

  <rect x="580" y="58" width="14" height="14" rx="3" fill="#3b0764" stroke="#c084fc" stroke-width="1.2"/>
  <text x="600" y="70" fill="#c084fc" font-size="11" font-weight="600">SNIP-36 Virtual Block / Prover</text>

  <rect x="830" y="58" width="14" height="14" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1.2"/>
  <text x="850" y="70" fill="#34d399" font-size="11" font-weight="600">On-chain (Starknet Sepolia)</text>

  <rect x="1060" y="58" width="14" height="14" rx="3" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="1080" y="70" fill="#94a3b8" font-size="11">State update</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- COLUMN ZONES -->

  <!-- Player column -->
  <rect x="20" y="90" width="260" height="845" rx="10" fill="#fbbf2406" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="150" y="112" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600" opacity="0.5">PLAYER</text>

  <!-- Server column -->
  <rect x="300" y="90" width="280" height="845" rx="10" fill="url(#server-bg)" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="440" y="112" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" opacity="0.5">SERVER</text>

  <!-- Virtual Block / Prover column -->
  <rect x="600" y="90" width="280" height="845" rx="10" fill="url(#vblock-bg)" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="740" y="112" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600" opacity="0.5">VIRTUAL BLOCK / PROVER</text>

  <!-- On-chain column -->
  <rect x="900" y="90" width="480" height="845" rx="10" fill="url(#onchain-bg)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="1140" y="112" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600" opacity="0.5">ON-CHAIN (Starknet)</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 1: Commit -->
  <rect x="35" y="135" width="230" height="55" rx="8" fill="#fbbf2412" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="55" y="157" fill="#fbbf24" font-size="13" font-weight="700">1. Commit bet</text>
  <text x="55" y="175" fill="#d1d5db" font-size="10">pedersen(bet, nonce) — bet hidden</text>

  <rect x="315" y="135" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="157" fill="#60a5fa" font-size="12" font-weight="600">Store commitment</text>
  <text x="335" y="175" fill="#64748b" font-size="10">Server cannot see the bet</text>

  <line x1="265" y1="162" x2="313" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 2: Deposit -->
  <rect x="35" y="215" width="230" height="55" rx="8" fill="#fbbf2412" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="55" y="237" fill="#fbbf24" font-size="13" font-weight="700">2. Deposit STRK</text>
  <text x="55" y="255" fill="#d1d5db" font-size="10">Sign approve + deposit (1 tx)</text>

  <rect x="920" y="215" width="220" height="55" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="940" y="237" fill="#34d399" font-size="12" font-weight="700">STRK.transferFrom()</text>
  <text x="940" y="255" fill="#a7f3d0" font-size="10">Player → CoinFlipBank</text>

  <rect x="1160" y="215" width="200" height="55" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="1180" y="237" fill="#94a3b8" font-size="11" font-weight="600">Bank storage:</text>
  <text x="1180" y="255" fill="#64748b" font-size="10">game[session] = DEPOSITED</text>

  <line x1="265" y1="242" x2="918" y2="242" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="1140" y1="242" x2="1158" y2="242" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 3: Bank Match -->
  <rect x="315" y="295" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="317" fill="#60a5fa" font-size="12" font-weight="600">3. Bank match_deposit()</text>
  <text x="335" y="335" fill="#64748b" font-size="10">Server matches player's bet</text>

  <rect x="920" y="295" width="220" height="55" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="940" y="317" fill="#34d399" font-size="12" font-weight="700">STRK.transferFrom()</text>
  <text x="940" y="335" fill="#a7f3d0" font-size="10">Bank → CoinFlipBank</text>

  <rect x="1160" y="295" width="200" height="55" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="1180" y="317" fill="#94a3b8" font-size="11" font-weight="600">Bank storage:</text>
  <text x="1180" y="335" fill="#64748b" font-size="10">game[session] = MATCHED</text>

  <line x1="565" y1="322" x2="918" y2="322" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="1140" y1="322" x2="1158" y2="322" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- Pot callout -->
  <rect x="920" y="362" width="220" height="28" rx="6" fill="#fbbf2410" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="1030" y="380" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Contract now holds 2x bet (the pot)</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 4: Lock Seed -->
  <rect x="315" y="405" width="250" height="55" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="335" y="427" fill="#60a5fa" font-size="12" font-weight="700">4. Lock seed block</text>
  <text x="335" y="445" fill="#94a3b8" font-size="10">seed = current_block - 1</text>

  <rect x="35" y="405" width="230" height="55" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="55" y="427" fill="#fbbf24" font-size="11" font-weight="600">Fairness guarantee</text>
  <text x="55" y="445" fill="#d1d5db" font-size="9">Seed locked AFTER commit, BEFORE reveal</text>

  <text x="440" y="475" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">Nonce at seed_block includes match_deposit</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 5: Reveal + Construct -->
  <rect x="315" y="500" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="522" fill="#60a5fa" font-size="12" font-weight="600">5. Reveal + construct tx</text>
  <text x="335" y="540" fill="#64748b" font-size="10">Verify commitment, build virtual tx</text>

  <!-- Arrow from player reveal -->
  <rect x="35" y="500" width="230" height="55" rx="8" fill="#fbbf2412" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="55" y="522" fill="#fbbf24" font-size="13" font-weight="700">Reveal bet + nonce</text>
  <text x="55" y="540" fill="#d1d5db" font-size="10">Server verifies commitment</text>

  <line x1="265" y1="527" x2="313" y2="527" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 6: Virtual OS -->
  <rect x="615" y="580" width="250" height="70" rx="8" fill="#3b0764" stroke="#c084fc" stroke-width="1.5"/>
  <text x="635" y="602" fill="#c084fc" font-size="13" font-weight="700">6. Virtual OS execution</text>
  <text x="635" y="620" fill="#e9d5ff" font-size="10">play(seed, player, bet)</text>
  <text x="635" y="636" fill="#a855f7" font-size="9">against reference block state (zero gas)</text>

  <rect x="315" y="585" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="607" fill="#60a5fa" font-size="12" font-weight="600">Send to Virtual OS</text>
  <text x="335" y="625" fill="#64748b" font-size="10">starknet_proveTransaction RPC</text>

  <line x1="565" y1="612" x2="613" y2="612" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Output callout -->
  <rect x="615" y="660" width="250" height="40" rx="6" fill="#c084fc10" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="635" y="676" fill="#c084fc" font-size="10" font-weight="600">Output: Cairo PIE</text>
  <text x="635" y="690" fill="#a855f7" font-size="9">+ L2→L1 msg [player, seed, bet, outcome, won]</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 7: stwo Prover -->
  <rect x="615" y="715" width="250" height="55" rx="8" fill="#3b0764" stroke="#f472b6" stroke-width="1.5"/>
  <text x="635" y="737" fill="#f472b6" font-size="13" font-weight="700">7. stwo STARK prover</text>
  <text x="635" y="755" fill="#fda4af" font-size="10">Circle STARK proof (~200-400 KB)</text>

  <line x1="740" y1="700" x2="740" y2="713" stroke="#c084fc" stroke-width="1" marker-end="url(#arr-purple)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 8: Submit proof on-chain -->
  <rect x="315" y="790" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="812" fill="#60a5fa" font-size="12" font-weight="600">8. Submit proof</text>
  <text x="335" y="830" fill="#64748b" font-size="10">proof + proof_facts → Gateway</text>

  <rect x="920" y="790" width="220" height="55" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="940" y="812" fill="#34d399" font-size="12" font-weight="700">Protocol verifies proof</text>
  <text x="940" y="830" fill="#a7f3d0" font-size="10">SNIP-36 in-protocol verification</text>

  <line x1="565" y1="817" x2="918" y2="817" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Arrow from prover to server -->
  <path d="M 615 742 L 565 742 L 565 790" fill="none" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 9: Settlement -->
  <rect x="315" y="865" width="250" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="335" y="887" fill="#60a5fa" font-size="12" font-weight="600">9. Settle</text>
  <text x="335" y="905" fill="#64748b" font-size="10">Server calls settle(session)</text>

  <rect x="920" y="865" width="220" height="55" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="940" y="882" fill="#34d399" font-size="12" font-weight="700">CoinFlipBank.settle()</text>
  <text x="940" y="898" fill="#a7f3d0" font-size="10">pedersen(seed, player) % 2</text>
  <text x="940" y="912" fill="#a7f3d0" font-size="10">Winner credited 2x bet</text>

  <rect x="1160" y="865" width="200" height="55" rx="8" fill="#0f172a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="1180" y="887" fill="#94a3b8" font-size="11" font-weight="600">Bank storage:</text>
  <text x="1180" y="905" fill="#64748b" font-size="10">player_balance[winner] += 2x</text>

  <line x1="565" y1="892" x2="918" y2="892" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="1140" y1="892" x2="1158" y2="892" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STEP 10: Withdraw -->
  <rect x="35" y="865" width="230" height="55" rx="8" fill="#fbbf2412" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="55" y="887" fill="#fbbf24" font-size="13" font-weight="700">10. Withdraw (optional)</text>
  <text x="55" y="905" fill="#d1d5db" font-size="10">Player signs withdraw() tx</text>

  <line x1="265" y1="892" x2="918" y2="892" stroke="#fbbf24" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>
  <text x="600" y="886" fill="#fbbf24" font-size="9" opacity="0.6">STRK → player wallet</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Vertical flow connectors -->
  <line x1="150" y1="190" x2="150" y2="213" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="190" x2="440" y2="293" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="350" x2="440" y2="403" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="460" x2="440" y2="498" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="555" x2="440" y2="583" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="845" x2="440" y2="863" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Dashed line from player to withdraw (spans full height) -->
  <line x1="150" y1="270" x2="150" y2="863" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4 4"/>
</svg>
